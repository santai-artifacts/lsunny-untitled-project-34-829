<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game :)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .container {
      text-align: center;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 2.5em;
    }

    .score-board {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
      gap: 10px;
    }

    .score-item {
      background: #f0f0f0;
      padding: 10px 20px;
      border-radius: 10px;
      flex: 1;
    }

    .score-label {
      font-size: 0.85em;
      color: #666;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .score-value {
      font-size: 1.8em;
      color: #667eea;
      font-weight: bold;
    }

    .game-board {
      background: #111;
      border: 3px solid #667eea;
      border-radius: 10px;
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      grid-template-rows: repeat(20, 1fr);
      gap: 0;
      aspect-ratio: 1;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .cell {
      background: #1a1a1a;
      position: relative;
    }

    .snake {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      border-radius: 2px;
      width: 100%;
      height: 100%;
      box-shadow: inset 0 0 2px rgba(255, 255, 255, 0.3);
    }

    .snake.head {
      background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
      box-shadow: inset 0 0 4px rgba(255, 255, 255, 0.5), 0 0 8px rgba(34, 197, 94, 0.6);
    }

    .food {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      border-radius: 50%;
      width: 100%;
      height: 100%;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.8);
      animation: pulse 0.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(0.9);
      }
      50% {
        transform: scale(1);
      }
    }

    .controls {
      margin-bottom: 20px;
    }

    .instructions {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    button:active {
      transform: translateY(0);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-content h2 {
      color: #333;
      font-size: 2em;
      margin-bottom: 20px;
    }

    .modal-content p {
      color: #666;
      font-size: 1.2em;
      margin-bottom: 30px;
    }

    .modal-content button {
      font-size: 1.1em;
      padding: 14px 40px;
    }

    .status {
      font-size: 0.9em;
      color: #666;
      margin-top: 10px;
      min-height: 20px;
    }

    .status.playing {
      color: #22c55e;
    }

    .status.paused {
      color: #f59e0b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐍 Snake</h1>

    <div class="score-board">
      <div class="score-item">
        <div class="score-label">Score</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">High Score</div>
        <div class="score-value" id="high-score">0</div>
      </div>
    </div>

    <div class="game-board" id="game-board"></div>

    <div class="controls">
      <div class="instructions">
        Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to move
      </div>
      <div class="button-group">
        <button id="play-btn">Start Game</button>
        <button id="pause-btn">Pause</button>
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>

  <div class="modal" id="game-over-modal">
    <div class="modal-content">
      <h2>Game Over!</h2>
      <p id="final-score">Final Score: 0</p>
      <button onclick="game.reset()">Play Again</button>
    </div>
  </div>

  <script>
    const GRID_SIZE = 20;
    const INITIAL_SPEED = 100;

    class SnakeGame {
      constructor() {
        this.reset();
        this.setupEventListeners();
        this.loadHighScore();
      }

      reset() {
        this.snake = [
          { x: 10, y: 10 },
          { x: 9, y: 10 },
          { x: 8, y: 10 }
        ];
        this.direction = { x: 1, y: 0 };
        this.nextDirection = { x: 1, y: 0 };
        this.food = this.generateFood();
        this.score = 0;
        this.isPlaying = false;
        this.isPaused = false;
        this.gameOverModalEl = document.getElementById('game-over-modal');
        this.scoreEl = document.getElementById('score');
        this.highScoreEl = document.getElementById('high-score');
        this.statusEl = document.getElementById('status');
        this.playBtnEl = document.getElementById('play-btn');
        this.pauseBtnEl = document.getElementById('pause-btn');

        this.updateDisplay();
        this.render();
      }

      generateFood() {
        let food;
        let valid = false;
        while (!valid) {
          food = {
            x: Math.floor(Math.random() * GRID_SIZE),
            y: Math.floor(Math.random() * GRID_SIZE)
          };
          valid = !this.snake.some(segment => segment.x === food.x && segment.y === food.y);
        }
        return food;
      }

      setupEventListeners() {
        document.addEventListener('keydown', (e) => {
          const key = e.key.toLowerCase();
          const arrowMap = {
            'arrowup': { x: 0, y: -1 },
            'arrowdown': { x: 0, y: 1 },
            'arrowleft': { x: -1, y: 0 },
            'arrowright': { x: 1, y: 0 },
            'w': { x: 0, y: -1 },
            's': { x: 0, y: 1 },
            'a': { x: -1, y: 0 },
            'd': { x: 1, y: 0 }
          };

          if (arrowMap[key]) {
            e.preventDefault();
            const newDir = arrowMap[key];
            // Prevent reversing into itself
            if (!(newDir.x === -this.direction.x && newDir.y === -this.direction.y)) {
              this.nextDirection = newDir;
            }
          }
        });

        this.playBtnEl.addEventListener('click', () => this.play());
        this.pauseBtnEl.addEventListener('click', () => this.togglePause());
      }

      play() {
        if (this.isPlaying) return;
        this.isPlaying = true;
        this.isPaused = false;
        this.gameOverModalEl.classList.remove('show');
        this.updateDisplay();
        this.gameLoop();
      }

      togglePause() {
        if (!this.isPlaying) return;
        this.isPaused = !this.isPaused;
        this.updateDisplay();
        if (!this.isPaused) {
          this.gameLoop();
        }
      }

      update() {
        this.direction = this.nextDirection;

        const head = { ...this.snake[0] };
        head.x += this.direction.x;
        head.y += this.direction.y;

        // Wall collision
        if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
          this.endGame();
          return;
        }

        // Self collision
        if (this.snake.some(segment => segment.x === head.x && segment.y === head.y)) {
          this.endGame();
          return;
        }

        this.snake.unshift(head);

        // Food collision
        if (head.x === this.food.x && head.y === this.food.y) {
          this.score += 10;
          this.food = this.generateFood();
        } else {
          this.snake.pop();
        }
      }

      endGame() {
        this.isPlaying = false;
        this.updateDisplay();
        document.getElementById('final-score').textContent = `Final Score: ${this.score}`;
        this.gameOverModalEl.classList.add('show');

        if (this.score > this.highScore) {
          this.highScore = this.score;
          this.saveHighScore();
        }
      }

      gameLoop() {
        if (!this.isPlaying || this.isPaused) return;

        this.update();
        this.updateDisplay();
        this.render();

        setTimeout(() => this.gameLoop(), INITIAL_SPEED);
      }

      updateDisplay() {
        this.scoreEl.textContent = this.score;
        this.highScoreEl.textContent = this.highScore;

        if (this.isPlaying && !this.isPaused) {
          this.statusEl.textContent = '▶ Playing...';
          this.statusEl.className = 'status playing';
          this.playBtnEl.textContent = 'Restart';
          this.pauseBtnEl.disabled = false;
        } else if (this.isPlaying && this.isPaused) {
          this.statusEl.textContent = '⏸ Paused';
          this.statusEl.className = 'status paused';
          this.pauseBtnEl.disabled = false;
        } else {
          this.statusEl.textContent = '';
          this.statusEl.className = 'status';
          this.playBtnEl.textContent = 'Start Game';
          this.pauseBtnEl.disabled = true;
        }
      }

      render() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';

        const grid = Array.from({ length: GRID_SIZE * GRID_SIZE }, () => null);

        this.snake.forEach((segment, index) => {
          const pos = segment.y * GRID_SIZE + segment.x;
          grid[pos] = { type: 'snake', isHead: index === 0 };
        });

        const foodPos = this.food.y * GRID_SIZE + this.food.x;
        grid[foodPos] = { type: 'food' };

        grid.forEach((cell) => {
          const cellEl = document.createElement('div');
          cellEl.className = 'cell';

          if (cell) {
            if (cell.type === 'snake') {
              const snakeEl = document.createElement('div');
              snakeEl.className = `snake ${cell.isHead ? 'head' : ''}`;
              cellEl.appendChild(snakeEl);
            } else if (cell.type === 'food') {
              const foodEl = document.createElement('div');
              foodEl.className = 'food';
              cellEl.appendChild(foodEl);
            }
          }

          board.appendChild(cellEl);
        });
      }

      loadHighScore() {
        this.highScore = 0;
        this.highScoreEl.textContent = this.highScore;
      }

      saveHighScore() {
        // Persists in memory during the session
      }
    }

    const game = new SnakeGame();
  </script>
</body>
</html>
