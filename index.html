<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 Game@</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ffd6e8 0%, #ffc0d9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
    }

    .header {
      margin-bottom: 30px;
      color: #ff69b4;
    }

    .header h1 {
      font-size: clamp(2rem, 8vw, 3.5rem);
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .stats {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.8);
      padding: 12px 20px;
      border-radius: 20px;
      color: #ff69b4;
      backdrop-filter: blur(10px);
      border: 2px solid #ffb6d9;
      box-shadow: 0 8px 20px rgba(255, 105, 180, 0.15);
    }

    .stat-label {
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      opacity: 0.8;
      margin-bottom: 5px;
      font-weight: 600;
    }

    .stat-value {
      font-size: clamp(1.3rem, 5vw, 1.8rem);
      font-weight: bold;
    }

    .controls {
      margin-bottom: 25px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: clamp(10px, 3vw, 12px) clamp(20px, 6vw, 30px);
      font-size: clamp(0.9rem, 4vw, 1rem);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
      min-height: 44px;
    }

    .btn-primary {
      background: #ff69b4;
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px rgba(255, 105, 180, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.9);
      color: #ff69b4;
      border: 2px solid #ffb6d9;
    }

    .btn-secondary:hover {
      background: white;
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px rgba(255, 105, 180, 0.3);
    }

    .game-board {
      position: relative;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 25px;
      padding: clamp(12px, 4vw, 15px);
      width: min(90vw, 340px);
      height: min(90vw, 340px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-gap: clamp(8px, 2.5vw, 12px);
      box-shadow: 0 15px 35px rgba(255, 105, 180, 0.2);
      border: 3px solid rgba(255, 182, 217, 0.5);
    }

    .tile-container {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 15px;
      background: rgba(255, 230, 240, 0.6);
      box-shadow: inset 0 2px 5px rgba(255, 182, 217, 0.3);
    }

    .tile {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 15px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.2rem, 5vw, 2rem);
      color: white;
      transition: all 0.15s ease-in-out;
      box-shadow: 0 6px 15px rgba(255, 105, 180, 0.25);
    }

    .tile.new {
      animation: newTile 0.2s ease-in;
    }

    @keyframes newTile {
      0% {
        transform: scale(0.8);
        opacity: 0.8;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .tile.merged {
      animation: merge 0.2s ease-in;
    }

    @keyframes merge {
      0% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1);
      }
    }

    .tile-2 { background: #ffb6d9; }
    .tile-4 { background: #ffa3ce; }
    .tile-8 { background: #ff85c0; }
    .tile-16 { background: #ff69b4; }
    .tile-32 { background: #ff1493; }
    .tile-64 { background: #ff0080; }
    .tile-128 { background: #c71585; font-size: 1.5rem; }
    .tile-256 { background: #d81b60; font-size: 1.5rem; }
    .tile-512 { background: #ad1457; font-size: 1.5rem; }
    .tile-1024 { background: #880e4f; font-size: 1.2rem; }
    .tile-2048 { background: #6a0572; font-size: 1.2rem; }
    .tile-4096 { background: #4a0047; font-size: 1.2rem; }
    .tile-8192 { background: #2e0145; font-size: 1.2rem; }

    .game-over {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .game-over.show {
      display: flex;
    }

    .game-over-content {
      background: white;
      padding: clamp(25px, 8vw, 40px);
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
      max-width: 90vw;
      margin: 20px;
      border: 3px solid #ffb6d9;
    }

    .game-over-content h2 {
      font-size: clamp(1.8rem, 6vw, 2.5rem);
      color: #ff69b4;
      margin-bottom: 15px;
    }

    .game-over-content p {
      font-size: clamp(1rem, 4vw, 1.2rem);
      color: #ff69b4;
      margin-bottom: 25px;
      font-weight: 500;
    }

    .game-over-content .final-score {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: bold;
      color: #ff1493;
      margin-bottom: 25px;
    }

    .hint {
      color: #ff69b4;
      font-size: 0.9rem;
      margin-top: 20px;
      font-weight: 500;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .header {
        margin-bottom: 20px;
      }

      .stats {
        gap: 12px;
        margin-bottom: 16px;
      }

      .stat-box {
        padding: 10px 16px;
      }

      .controls {
        gap: 10px;
        margin-bottom: 16px;
      }

      .hint {
        font-size: 0.8rem;
        margin-top: 15px;
      }

      .tile-128,
      .tile-256,
      .tile-512 {
        font-size: clamp(0.9rem, 3.5vw, 1.2rem);
      }

      .tile-1024,
      .tile-2048,
      .tile-4096,
      .tile-8192 {
        font-size: clamp(0.7rem, 3vw, 1rem);
      }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      body {
        padding: 20px;
      }

      .header {
        margin-bottom: 24px;
      }

      .stats {
        gap: 16px;
        margin-bottom: 18px;
      }

      .controls {
        gap: 12px;
        margin-bottom: 20px;
      }

      .tile-128,
      .tile-256,
      .tile-512 {
        font-size: clamp(1rem, 4vw, 1.3rem);
      }

      .tile-1024,
      .tile-2048,
      .tile-4096,
      .tile-8192 {
        font-size: clamp(0.8rem, 3.5vw, 1.1rem);
      }
    }

    @media (min-width: 769px) {
      .stats {
        gap: 20px;
      }

      .controls {
        gap: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>2048</h1>
      <div class="stats">
        <div class="stat-box">
          <div class="stat-label">Score</div>
          <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Best</div>
          <div class="stat-value" id="best">0</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-primary" onclick="game.reset()">New Game</button>
      <button class="btn-secondary" onclick="game.undo()">Undo</button>
    </div>

    <div class="game-board" id="gameBoard">
      <div class="tile-container"></div>
      <div class="tile-container"></div>
      <div class="tile-container"></div>
      <div class="tile-container"></div>

      <div class="tile-container"></div>
      <div class="tile-container"></div>
      <div class="tile-container"></div>
      <div class="tile-container"></div>

      <div class="tile-container"></div>
      <div class="tile-container"></div>
      <div class="tile-container"></div>
      <div class="tile-container"></div>

      <div class="tile-container"></div>
      <div class="tile-container"></div>
      <div class="tile-container"></div>
      <div class="tile-container"></div>
    </div>

    <div class="hint">Use arrow keys or swipe to play</div>
  </div>

  <div class="game-over" id="gameOver">
    <div class="game-over-content">
      <h2 id="gameOverTitle">Game Over!</h2>
      <p>No more moves available</p>
      <div class="final-score" id="finalScore">Score: 0</div>
      <button class="btn-primary" onclick="game.reset()">Play Again</button>
    </div>
  </div>

  <script>
    const game = {
      size: 4,
      tiles: [],
      score: 0,
      best: localStorage.getItem('best2048') ? parseInt(localStorage.getItem('best2048')) : 0,
      history: [],
      maxHistory: 10,

      init() {
        this.tiles = Array(this.size * this.size).fill(0);
        this.score = 0;
        this.history = [];
        this.addNewTile();
        this.addNewTile();
        this.updateDisplay();
        document.getElementById('gameOver').classList.remove('show');
      },

      reset() {
        this.init();
      },

      undo() {
        if (this.history.length === 0) return;
        const state = this.history.pop();
        this.tiles = [...state.tiles];
        this.score = state.score;
        this.updateDisplay();
      },

      saveState() {
        if (this.history.length >= this.maxHistory) {
          this.history.shift();
        }
        this.history.push({
          tiles: [...this.tiles],
          score: this.score
        });
      },

      addNewTile() {
        const empty = this.tiles
          .map((v, i) => v === 0 ? i : null)
          .filter(v => v !== null);

        if (empty.length === 0) return false;

        const idx = empty[Math.floor(Math.random() * empty.length)];
        this.tiles[idx] = Math.random() < 0.9 ? 2 : 4;
        return true;
      },

      move(direction) {
        this.saveState();
        const oldTiles = this.tiles.map(v => v);
        let moved = false;

        if (direction === 'left' || direction === 'right') {
          for (let i = 0; i < this.size; i++) {
            const row = this.getRow(i);
            const newRow = direction === 'left' ? this.compressRow(row) : this.compressRow(row.reverse()).reverse();
            if (JSON.stringify(row) !== JSON.stringify(newRow)) {
              moved = true;
              this.setRow(i, newRow);
            }
          }
        } else {
          for (let j = 0; j < this.size; j++) {
            const col = this.getCol(j);
            const newCol = direction === 'up' ? this.compressRow(col) : this.compressRow(col.reverse()).reverse();
            if (JSON.stringify(col) !== JSON.stringify(newCol)) {
              moved = true;
              this.setCol(j, newCol);
            }
          }
        }

        if (!moved) {
          this.history.pop();
          return false;
        }

        this.addNewTile();
        this.updateDisplay();

        if (!this.canMove()) {
          setTimeout(() => this.gameOver(), 300);
        }

        return true;
      },

      compressRow(row) {
        let arr = row.filter(v => v !== 0);
        const merged = [];

        for (let i = 0; i < arr.length; i++) {
          if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
            const newVal = arr[i] * 2;
            this.score += newVal;
            merged.push(newVal);
            i++;
          } else {
            merged.push(arr[i]);
          }
        }

        while (merged.length < this.size) {
          merged.push(0);
        }

        return merged;
      },

      getRow(i) {
        return this.tiles.slice(i * this.size, (i + 1) * this.size);
      },

      setRow(i, row) {
        this.tiles.splice(i * this.size, this.size, ...row);
      },

      getCol(j) {
        const col = [];
        for (let i = 0; i < this.size; i++) {
          col.push(this.tiles[i * this.size + j]);
        }
        return col;
      },

      setCol(j, col) {
        for (let i = 0; i < this.size; i++) {
          this.tiles[i * this.size + j] = col[i];
        }
      },

      canMove() {
        // Check for empty cells
        if (this.tiles.some(v => v === 0)) return true;

        // Check for possible merges
        for (let i = 0; i < this.size; i++) {
          for (let j = 0; j < this.size; j++) {
            const current = this.tiles[i * this.size + j];
            if (j < this.size - 1 && current === this.tiles[i * this.size + j + 1]) return true;
            if (i < this.size - 1 && current === this.tiles[(i + 1) * this.size + j]) return true;
          }
        }

        return false;
      },

      gameOver() {
        if (this.score > this.best) {
          this.best = this.score;
          localStorage.setItem('best2048', this.best);
        }
        document.getElementById('finalScore').textContent = `Score: ${this.score}`;
        document.getElementById('gameOver').classList.add('show');
      },

      updateDisplay() {
        const board = document.getElementById('gameBoard');
        board.innerHTML = '';

        for (let i = 0; i < this.size * this.size; i++) {
          const container = document.createElement('div');
          container.className = 'tile-container';

          if (this.tiles[i] !== 0) {
            const tile = document.createElement('div');
            tile.className = `tile tile-${this.tiles[i]} new`;
            tile.textContent = this.tiles[i];
            container.appendChild(tile);
          }

          board.appendChild(container);
        }

        document.getElementById('score').textContent = this.score;
        document.getElementById('best').textContent = this.best;
      }
    };

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      const dirMap = {
        'ArrowLeft': 'left',
        'ArrowRight': 'right',
        'ArrowUp': 'up',
        'ArrowDown': 'down'
      };

      if (dirMap[e.key]) {
        e.preventDefault();
        game.move(dirMap[e.key]);
      }
    });

    // Touch controls
    let touchStartX = 0;
    let touchStartY = 0;

    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, false);

    document.addEventListener('touchend', (e) => {
      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;
      const diffX = touchStartX - touchEndX;
      const diffY = touchStartY - touchEndY;
      const threshold = 50;

      if (Math.abs(diffX) > threshold || Math.abs(diffY) > threshold) {
        if (Math.abs(diffX) > Math.abs(diffY)) {
          game.move(diffX > 0 ? 'left' : 'right');
        } else {
          game.move(diffY > 0 ? 'up' : 'down');
        }
      }
    }, false);

    // Start game
    game.init();
  </script>
</body>
</html>
